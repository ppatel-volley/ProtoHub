name: Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/config/labeler-config.yml

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check for PSDK version change
        id: psdk-check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin $BASE_REF
          if git diff origin/$BASE_REF...HEAD -- '**/package.json' | grep '^[+-]' | grep -q '"@volley/platform-sdk"'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/github-script@v7
        if: steps.psdk-check.outputs.changed == 'true'
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['PSDK Version']
            })
