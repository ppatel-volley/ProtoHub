name: Lint, Build, Test

on:
    pull_request:
    merge_group:
        types: [checks_requested]

jobs:
    lint-build-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Environment
              uses: ./.github/actions/setup-environment
              with:
                  npm-token: ${{ secrets.NPM_TOKEN }}

            - name: Lint
              run: pnpm lint

            - name: Typecheck
              run: pnpm typecheck

            - name: Build
              run: pnpm build

            - name: Unit Tests
              run: pnpm test:unit
