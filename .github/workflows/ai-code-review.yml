name: AI Code Review

on:
    pull_request:
        types:
            - opened
            - synchronize

permissions:
    contents: read
    pull-requests: write

jobs:
    ai-code-review-gate:
        runs-on: ubuntu-latest
        outputs:
            run: ${{ steps.gate.outputs.run }}
        steps:
            - name: Gate
              id: gate
              env:
                  HEAD_REF: ${{ github.head_ref }}
                  PR_ACTION: ${{ github.event.action }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  run=false
                  if [[ "$HEAD_REF" == "dana/ai-code-review" ]]; then
                    run=true
                  elif [[ $(date +%Y%m%d) -ge 20260304 && "$PR_ACTION" != "synchronize" ]]; then
                    [[ $(( PR_NUMBER % 5 )) -eq 0 ]] && run=true
                  fi
                  echo "run=$run" >> $GITHUB_OUTPUT

    ai-review:
        needs: ai-code-review-gate
        if: needs.ai-code-review-gate.outputs.run == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Get PR context
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  pr_json=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}")
                  echo "$pr_json" | jq -r '.title // ""' > pr_title.txt
                  echo "$pr_json" | jq -r '.body // ""' | head -c 1500 > pr_body.txt
                  echo "$pr_json" | jq -r '.head.sha' > pr_head_sha.txt

                  curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
                    | jq -r '.[].filename' | head -50 > pr_files.txt

            - name: Automated review
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: |
                  system='You are FreakGPT, a code review bot. Your vibe: lots of emojis (😏🔥💦👀), playful innuendo and double entendres, and cheeky suggestions (e.g. renaming variables to something suggestive or punny). You are flirty and winking, not mean. Suggestive and innuendo-heavy is fine; obscene is not—no explicit sexual content, crude body-part language, or pornographic imagery. Keep it workplace-adjacent (hard PG-13). You MUST also include exactly one short, genuinely useful piece of review advice (a real nit or tip). Keep the whole review to 2-4 short paragraphs; keep each paragraph to 1-3 sentences. Output only the review body, no preamble.'
                  user="PR title: $(cat pr_title.txt)

                  PR body (excerpt): $(cat pr_body.txt)

                  Files changed:
                  $(cat pr_files.txt)

                  Write a brief review."
                  payload=$(jq -n \
                    --arg sys "$system" \
                    --arg user "$user" \
                    '{model: "gpt-4o-mini", max_tokens: 550, temperature: 1.2, messages: [{role: "system", content: $sys}, {role: "user", content: $user}]}')
                  resp=$(curl -sS -X POST "https://api.openai.com/v1/chat/completions" \
                    -H "Authorization: Bearer $OPENAI_API_KEY" \
                    -H "Content-Type: application/json" \
                    -d "$payload")
                  content=$(echo "$resp" | jq -r '.choices[0].message.content // "Review could not be generated. Try again later."')
                  printf '%s\n\n%s' "## AI Code Review" "$content" > review_body.txt

            - name: Post review
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  body_json=$(jq -Rs . < review_body.txt)
                  head_sha=$(cat pr_head_sha.txt)
                  curl -sS -X POST \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
                    -d "{\"commit_id\": \"$head_sha\", \"body\": $body_json, \"event\": \"COMMENT\"}"
